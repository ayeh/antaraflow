<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Item — AppName</title>
    <link rel="stylesheet" href="presets/preset-blank.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/app.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="../assets/app.js"></script>
</head>
<body class="h-full bg-slate-200 dark:bg-slate-950 text-slate-900 dark:text-slate-100">
<div x-data="appState" x-init="init()" class="min-h-full">

    <!-- SIDEBAR: copy _sidebar.html content here in production -->
    <!-- For this template, we include a simplified inline sidebar reference -->

    <!-- Content area wrapper -->
    <div :class="sidebarCollapsed ? 'md:ml-[5rem]' : 'md:ml-[15.5rem]'"
         class="flex flex-col min-h-screen bg-slate-50 dark:bg-slate-900
                md:mt-3 md:[clip-path:inset(0_0_0_0_round_1rem_0_0_0)]
                transition-all duration-300 ease-in-out">

        <!-- HEADER: copy _header.html content here in production -->
        <header class="sticky top-0 z-30 bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm
                       border-b border-slate-200 dark:border-slate-700 px-6 h-16
                       flex items-center gap-3">
            <div class="flex-1 min-w-0">
                <span class="text-sm font-medium text-slate-600 dark:text-slate-400">Organisation Name</span>
            </div>
            <button @click="cycleTheme()"
                    class="flex items-center justify-center w-8 h-8 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                <span x-show="theme === 'light'">☀️</span>
                <span x-show="theme === 'dark'">🌙</span>
                <span x-show="theme === 'system'">💻</span>
            </button>
        </header>

        <!-- FLASH MESSAGES -->
        <!-- Success: <div class="mx-6 mt-4 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 text-green-700 dark:text-green-300 px-4 py-3 rounded-lg text-sm">Success message</div> -->
        <!-- Error: <div class="mx-6 mt-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-300 px-4 py-3 rounded-lg text-sm">Error message</div> -->

        <main class="flex-1 p-6">
            <div class="max-w-2xl mx-auto space-y-4">

                <!-- Page header -->
                <div>
                    <a href="list.html"
                       class="inline-flex items-center gap-1.5 text-sm text-slate-500 dark:text-slate-400
                              hover:text-slate-700 dark:hover:text-slate-200 transition-colors mb-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                        </svg>
                        Back to Items
                    </a>
                    <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100">Create Item</h1>
                    <p class="text-sm text-slate-500 dark:text-slate-400 mt-0.5">Fill in the details below</p>
                </div>

                <form class="space-y-6">

                    <!-- Section: Basic Information -->
                    <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-6">
                        <h2 class="text-sm font-semibold text-slate-900 dark:text-slate-100 mb-4">Basic Information</h2>
                        <div class="space-y-4">

                            <!-- Text input — normal state -->
                            <div>
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">
                                    Name <span class="text-red-500">*</span>
                                </label>
                                <input type="text" placeholder="Enter name" value="Item Alpha"
                                       class="w-full px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600
                                              bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100
                                              placeholder-slate-400 dark:placeholder-slate-500 text-sm
                                              focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500 transition-colors">
                            </div>

                            <!-- Text input — validation error state -->
                            <div>
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">
                                    Slug <span class="text-red-500">*</span>
                                </label>
                                <input type="text" placeholder="item-slug" value=""
                                       class="w-full px-3 py-2.5 rounded-xl border border-red-300 dark:border-red-600
                                              bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100
                                              placeholder-slate-400 dark:placeholder-slate-500 text-sm
                                              focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500 transition-colors">
                                <p class="mt-1.5 text-sm text-red-600 dark:text-red-400">The slug field is required.</p>
                            </div>

                            <!-- Select -->
                            <div>
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Category</label>
                                <select class="w-full px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600
                                               bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 text-sm
                                               focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500 transition-colors">
                                    <option value="">Select a category</option>
                                    <option selected>Category A</option>
                                    <option>Category B</option>
                                    <option>Category C</option>
                                </select>
                            </div>

                            <!-- Textarea -->
                            <div>
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Description</label>
                                <textarea rows="4" placeholder="Enter a description..."
                                          class="w-full px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600
                                                 bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100
                                                 placeholder-slate-400 dark:placeholder-slate-500 text-sm
                                                 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500 transition-colors resize-y"></textarea>
                            </div>

                        </div>
                    </div>

                    <!-- Section: Settings -->
                    <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-6">
                        <h2 class="text-sm font-semibold text-slate-900 dark:text-slate-100 mb-4">Settings</h2>
                        <div class="space-y-5">

                            <!-- Date input -->
                            <div>
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Due Date</label>
                                <input type="date" value="2026-03-31"
                                       class="w-full px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600
                                              bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 text-sm
                                              focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500 transition-colors">
                            </div>

                            <!-- Priority select -->
                            <div>
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Priority</label>
                                <select class="w-full px-3 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600
                                               bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 text-sm
                                               focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500 transition-colors">
                                    <option>Low</option>
                                    <option selected>Medium</option>
                                    <option>High</option>
                                    <option>Critical</option>
                                </select>
                            </div>

                            <!-- Toggle switch -->
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm font-medium text-slate-700 dark:text-slate-300">Active</p>
                                    <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">Make this item visible to all users</p>
                                </div>
                                <button type="button"
                                        x-data="{ on: true }"
                                        @click="on = !on"
                                        :class="on ? 'bg-violet-600' : 'bg-slate-200 dark:bg-slate-600'"
                                        class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors
                                               focus:outline-none focus:ring-2 focus:ring-violet-500 focus:ring-offset-2">
                                    <span :class="on ? 'translate-x-6' : 'translate-x-1'"
                                          class="inline-block h-4 w-4 transform rounded-full bg-white shadow transition-transform"></span>
                                </button>
                            </div>

                            <!-- Checkbox -->
                            <div class="flex items-start gap-3">
                                <input type="checkbox" id="notify" checked
                                       class="mt-0.5 w-4 h-4 rounded border-slate-300 dark:border-slate-600 text-violet-600 focus:ring-violet-500">
                                <div>
                                    <label for="notify" class="text-sm font-medium text-slate-700 dark:text-slate-300 cursor-pointer">
                                        Send notification
                                    </label>
                                    <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">Notify team members when this item is created</p>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- Form actions -->
                    <div class="flex items-center justify-end gap-3">
                        <a href="list.html"
                           class="px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600
                                  text-sm font-medium text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800
                                  hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                            Cancel
                        </a>
                        <button type="submit"
                                class="px-6 py-2.5 rounded-xl bg-violet-600 hover:bg-violet-700
                                       text-white text-sm font-semibold transition-colors
                                       focus:outline-none focus:ring-2 focus:ring-violet-500 focus:ring-offset-2">
                            Create Item
                        </button>
                    </div>

                </form>
            </div>
        </main>
    </div>
</div>
</body>
</html>
